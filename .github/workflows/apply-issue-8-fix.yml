name: Apply issue 8 fix

on:
  push:
    branches:
      - master
    paths:
      - .github/workflows/apply-issue-8-fix.yml
  issues:
    types:
      - opened
  issue_comment:
    types:
      - created
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: apply-issue-8-fix
  cancel-in-progress: false

jobs:
  apply-and-validate:
    if: github.event_name != 'issue_comment' || github.event.comment.user.login != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Apply deterministic patch
        run: python tools/apply_issue_8_fix.py

      - name: Install project
        run: python -m pip install -e .

      - name: Run focused regression test
        run: python -m unittest discover -s tests -p 'test_implementation_result_integrity.py'

      - name: Run full test suite
        run: |
          set -o pipefail
          python -m unittest 2>&1 | tee /tmp/full-tests.log

      - name: Check diff integrity
        run: git diff --check

      - name: Commit validated fix and remove temporary automation
        run: |
          git rm tools/apply_issue_8_fix.py .github/workflows/apply-issue-8-fix.yml
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Fix implementation result validation"
          git push origin HEAD:master

      - name: Report workflow failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "La validation automatique du correctif #8 a échoué."
            echo
            echo "Exécution : ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            if [ -f /tmp/full-tests.log ]; then
              echo
              echo '```text'
              tail -c 12000 /tmp/full-tests.log
              echo '```'
            fi
          } > /tmp/issue-8-failure.md
          gh issue comment 13 --body-file /tmp/issue-8-failure.md
