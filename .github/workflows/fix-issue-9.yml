name: Fix issue 9

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'agent/apply-fix-9'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Check trigger
        id: guard
        shell: bash
        run: |
          if [[ -f .github/fix-issue-9.trigger ]] && ! grep -q '"protocol_command": protocol_command' src/loopforge/engine/__init__.py; then
            echo "apply=true" >> "$GITHUB_OUTPUT"
          else
            echo "apply=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.guard.outputs.apply == 'true'
        with:
          python-version: "3.11"

      - name: Apply focused patch
        if: steps.guard.outputs.apply == 'true'
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/patch-issue-9.py')
          text = path.read_text(encoding='utf-8')
          old = '        paths.append(path.replace("\\\\", "/"))'
          new = '        paths.append(path.replace("\\\\\\\\", "/"))'
          if text.count(old) != 1:
              raise SystemExit(f'escape marker count: {text.count(old)}')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          python .github/patch-issue-9.py > issue-9-patch.log 2>&1
          status=$?
          if [[ $status -ne 0 ]]; then
            cat issue-9-patch.log
            exit $status
          fi
          python - <<'PY'
          from pathlib import Path
          path = Path('src/loopforge/adapters/local_implementation_adapter.py')
          text = path.read_text(encoding='utf-8')
          start = text.index('def summary_for(')
          end = text.index('\n\ndef result_value(', start)
          replacement = '''def summary_for(
              status: str,
              completed: subprocess.CompletedProcess[bytes] | None,
              timed_out: bool,
              changed: bool,
              policy: dict[str, Any],
              *,
              fixture: bool = False,
          ) -> str:
              command_name = "Fixture command" if fixture else "Implementation command"
              if timed_out:
                  text = f"{command_name} timed out."
              elif completed is None:
                  text = f"{command_name} was not run."
              elif completed.returncode != 0:
                  text = f"{command_name} failed with return code {completed.returncode}."
              elif status == "blocked":
                  text = f"{command_name} completed without workspace changes."
              elif changed:
                  text = f"{command_name} completed and changed the workspace."
              else:
                  text = f"{command_name} completed."
              return text[: policy["max_summary_chars"]]
          '''
          text = text[:start] + replacement + text[end:]
          old_call = '    summary = summary_for(status, completed, timed_out, changed, policy)\n'
          new_call = '''    summary = summary_for(
              status,
              completed,
              timed_out,
              changed,
              policy,
              fixture=(
                  stream_output
                  and session["runner_id"] in policy["fixture_runner_ids"]
              ),
          )
          '''
          if text.count(old_call) != 1:
              raise SystemExit(f'summary call count: {text.count(old_call)}')
          path.write_text(text.replace(old_call, new_call, 1), encoding='utf-8')
          PY
          cat issue-9-patch.log

      - name: Install package
        if: steps.guard.outputs.apply == 'true'
        run: python -m pip install -e .

      - name: Validate
        if: steps.guard.outputs.apply == 'true'
        shell: bash
        run: |
          set +e
          python -m unittest > issue-9-test.log 2>&1
          test_status=$?
          git diff --check >> issue-9-test.log 2>&1
          diff_status=$?
          cat issue-9-test.log
          if [[ $test_status -ne 0 || $diff_status -ne 0 ]]; then
            exit 1
          fi

      - name: Upload diagnostics
        if: failure() && steps.guard.outputs.apply == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: issue-9-diagnostics
          path: issue-9-*.log

      - name: Commit validated fix
        if: success() && steps.guard.outputs.apply == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/loopforge/engine/__init__.py src/loopforge/adapters/local_implementation_adapter.py tests/test_implementation_result_integrity.py
          git commit -m "Fix local adapter fixture protocol"
          git push origin HEAD:${{ github.head_ref }}
