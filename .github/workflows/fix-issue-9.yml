name: Fix issue 9

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'agent/apply-fix-9'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Check trigger
        id: guard
        shell: bash
        run: |
          if [[ -f .github/fix-issue-9.trigger ]]; then
            echo "apply=true" >> "$GITHUB_OUTPUT"
          else
            echo "apply=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.guard.outputs.apply == 'true'
        with:
          python-version: "3.11"

      - name: Apply focused patch
        if: steps.guard.outputs.apply == 'true'
        shell: bash
        run: |
          python .github/patch-issue-9.py > issue-9-patch.log 2>&1
          status=$?
          cat issue-9-patch.log
          exit $status

      - name: Install package
        if: steps.guard.outputs.apply == 'true'
        run: python -m pip install -e .

      - name: Validate
        if: steps.guard.outputs.apply == 'true'
        shell: bash
        run: |
          set +e
          python -m unittest > issue-9-test.log 2>&1
          test_status=$?
          git diff --check >> issue-9-test.log 2>&1
          diff_status=$?
          cat issue-9-test.log
          if [[ $test_status -ne 0 || $diff_status -ne 0 ]]; then
            exit 1
          fi

      - name: Upload diagnostics
        if: failure() && steps.guard.outputs.apply == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: issue-9-diagnostics
          path: issue-9-*.log

      - name: Commit validated fix
        if: success() && steps.guard.outputs.apply == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/fix-issue-9.yml .github/fix-issue-9.trigger .github/patch-issue-9.py
          git add src/loopforge/engine/__init__.py src/loopforge/adapters/local_implementation_adapter.py tests/test_implementation_result_integrity.py
          git commit -m "Fix local adapter fixture protocol"
          git push origin HEAD:${{ github.head_ref }}
